# Project metadata
sonar.projectKey=hrms
sonar.projectName=HRMS Fullstack
sonar.projectVersion=1.0

# Source directories (relative to repo root)
sonar.sources=frontend-hrms,backend-hrms

# Exclusions (avoid scanning dependencies and build artifacts)
sonar.exclusions=**/node_modules/**,**/dist/**,**/build/**

# Coverage reports (frontend + backend)
# Adjust paths if your test runners output coverage elsewhere
sonar.javascript.lcov.reportPaths=frontend-hrms/coverage/lcov.info,backend-hrms/coverage/lcov.info
